---
- name: Create k3s config directory
  ansible.builtin.file:
    path: /etc/rancher/k3s
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy k3s server configuration
  ansible.builtin.template:
    src: config.yaml.j2
    dest: /etc/rancher/k3s/config.yaml
    owner: root
    group: root
    mode: "0600"
  notify: Restart k3s

- name: Check if k3s is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: _k3s_bin

- name: Install k3s server
  ansible.builtin.shell:
    cmd: >
      curl -sfL {{ k3s_install_script_url }} |
      INSTALL_K3S_VERSION='{{ k3s_version }}' sh -s - server {{ k3s_server_extra_args }}
    creates: /usr/local/bin/k3s
  when: not _k3s_bin.stat.exists

- name: Enable and start k3s
  ansible.builtin.service:
    name: k3s
    state: started
    enabled: true

- name: Wait for k3s node-token
  ansible.builtin.wait_for:
    path: /var/lib/rancher/k3s/server/node-token
    state: present
    timeout: 120

- name: Read k3s node token
  ansible.builtin.slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: _k3s_token_raw

- name: Export k3s token as host fact
  ansible.builtin.set_fact:
    k3s_token: "{{ _k3s_token_raw.content | b64decode | trim }}"

- name: Wait for k3s API to become ready
  ansible.builtin.wait_for:
    host: "{{ k3s_node_ip }}"
    port: 6443
    timeout: 120

- name: Read k3s kubeconfig
  ansible.builtin.slurp:
    src: /etc/rancher/k3s/k3s.yaml
  register: _k3s_kubeconfig_raw

- name: Export k3s kubeconfig as host fact
  ansible.builtin.set_fact:
    k3s_kubeconfig: "{{ _k3s_kubeconfig_raw.content | b64decode | regex_replace('127\\.0\\.0\\.1', k3s_node_ip) }}"
