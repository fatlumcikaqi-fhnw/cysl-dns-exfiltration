- name: Remove all Kubernetes NetworkPolicies in exfil-test
  ansible.builtin.command:
    cmd: kubectl delete netpol -n exfil-test --all --ignore-not-found
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: exfil_cleanup_netpol
  changed_when: "' deleted' in ((exfil_cleanup_netpol.stdout | default('')) ~ (exfil_cleanup_netpol.stderr | default('')))"

